<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hunter's System | Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .page-header {
      padding: 48px 0 36px; border-bottom: 1px solid var(--border-dim); margin-bottom: 48px;
    }
    .page-title {
      font-family: 'Orbitron', sans-serif; font-size: clamp(24px,4vw,42px);
      font-weight: 900; letter-spacing: 2px; color: var(--text-primary);
      text-shadow: var(--glow-blue);
    }
    .page-title span { color: var(--accent-blue); }
    .page-sub {
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      letter-spacing: 2px; color: var(--text-dim); margin-top: 8px;
    }

    /* ── SUMMARY STRIP ── */
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1px; background: var(--border-dim);
      border: 1px solid var(--border-dim);
      margin-bottom: 48px; overflow: hidden;
    }
    .summary-cell {
      background: var(--bg-panel); padding: 20px 24px; text-align: center;
    }
    .summary-value {
      font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900;
      color: var(--accent-cyan); text-shadow: 0 0 14px rgba(6,182,212,0.5);
      display: block; line-height: 1;
    }
    .summary-label {
      font-family: 'Share Tech Mono', monospace; font-size: 10px;
      letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase;
      margin-top: 8px; display: block;
    }

    /* ── TABS ── */
    .tabs {
      display: flex; border-bottom: 1px solid var(--border-dim); margin-bottom: 0;
    }
    .tab-btn {
      font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px;
      padding: 11px 28px; background: transparent; border: none; cursor: pointer;
      color: var(--text-dim); text-transform: uppercase;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover  { color: var(--text-secondary); }
    .tab-btn.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

    .tab-panel         { display: none; padding-top: 36px; }
    .tab-panel.active  { display: block; }

    /* ── STATUS FILTER ROW ── */
    .status-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }

    /* ── RANK PILLS ── */
    .rank-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .rank-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-panel); border: 1px solid var(--border-dim);
      padding: 8px 16px; font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: var(--text-dim); letter-spacing: 1px;
      transition: border-color 0.2s;
    }
    .rank-pill:hover { border-color: var(--border-glow); }
    .rank-pill .rp-rank  { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; }
    .rank-pill .rp-count { color: var(--text-secondary); }

    /* ── CARD EXTRAS ── */
    .card-date {
      font-family: 'Share Tech Mono', monospace; font-size: 10px;
      letter-spacing: 1px; color: var(--text-dim); margin-bottom: 10px;
    }
    .card-xp-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      color: var(--accent-gold); letter-spacing: 1px; margin-top: 10px;
    }

    /* ── QUESTS ── */
    .quest-boss-item {
      background: linear-gradient(135deg, rgba(245,158,11,0.06), rgba(245,158,11,0.02)) !important;
      border-color: rgba(245,158,11,0.25) !important;
    }
    .quest-boss-item:hover { border-color: rgba(245,158,11,0.5) !important; }
    .quest-xp-boss { color: var(--accent-gold) !important; }

    /* ── EMPTY ── */
    .empty-panel {
      text-align: center; padding: 70px 20px;
      border: 1px dashed var(--border-dim);
    }
    .empty-panel-icon { font-size: 36px; opacity: 0.3; margin-bottom: 16px; }
    .empty-panel-text {
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      letter-spacing: 2px; color: var(--text-dim);
    }
  </style>
</head>
<body>
<canvas id="particles"></canvas>

<nav>
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">⬡ HUNTER SYS</a>
    <div class="nav-links">
      <a href="index.html">HOME</a>
      <a href="tracker.html" class="active">TRACKER</a>
      <a href="rank.html">RANK</a>
      <a href="troubleshooting.html">HELP</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">LAB &amp; PROJECT <span>TRACKER</span></h1>
    <p class="page-sub" id="pageSubName">// CYBERSECURITY HUNTER PORTAL //</p>
  </div>

  <!-- SUMMARY STRIP -->
  <div class="summary-strip">
    <div class="summary-cell">
      <span class="summary-value" id="sumTotalXP">0</span>
      <span class="summary-label">TOTAL XP</span>
    </div>
    <div class="summary-cell">
      <span class="summary-value" id="sumLabsTotal">0</span>
      <span class="summary-label">TOTAL LABS</span>
    </div>
    <div class="summary-cell">
      <span class="summary-value" id="sumLabsDone">0</span>
      <span class="summary-label">LABS CLEARED</span>
    </div>
    <div class="summary-cell">
      <span class="summary-value" id="sumProjTotal">0</span>
      <span class="summary-label">TOTAL PROJECTS</span>
    </div>
    <div class="summary-cell">
      <span class="summary-value" id="sumProjDone">0</span>
      <span class="summary-label">PROJECTS DEPLOYED</span>
    </div>
    <div class="summary-cell">
      <span class="summary-value" id="sumRank" style="color:var(--accent-gold);">?</span>
      <span class="summary-label">CURRENT RANK</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('labs',this)">⚔ LABS</button>
    <button class="tab-btn"        onclick="switchTab('projects',this)">🛡 PROJECTS</button>
    <button class="tab-btn"        onclick="switchTab('quests',this)">📋 QUESTS</button>
  </div>

  <!-- ── LABS PANEL ── -->
  <div class="tab-panel active" id="panel-labs">
    <div class="rank-row" id="labRankRow"></div>
    <div class="status-row">
      <button class="filter-btn active" onclick="setFilter('labs','all',this)">ALL</button>
      <button class="filter-btn" onclick="setFilter('labs','complete',this)">CLEARED</button>
      <button class="filter-btn" onclick="setFilter('labs','progress',this)">IN PROGRESS</button>
      <button class="filter-btn" onclick="setFilter('labs','locked',this)">LOCKED</button>
    </div>
    <div class="cards-grid" id="labsGrid"></div>
  </div>

  <!-- ── PROJECTS PANEL ── -->
  <div class="tab-panel" id="panel-projects">
    <div class="rank-row" id="projRankRow"></div>
    <div class="status-row">
      <button class="filter-btn active" onclick="setFilter('projects','all',this)">ALL</button>
      <button class="filter-btn" onclick="setFilter('projects','complete',this)">DEPLOYED</button>
      <button class="filter-btn" onclick="setFilter('projects','progress',this)">IN PROGRESS</button>
      <button class="filter-btn" onclick="setFilter('projects','locked',this)">PLANNED</button>
    </div>
    <div class="cards-grid" id="projectsGrid"></div>
  </div>

  <!-- ── QUESTS PANEL ── -->
  <div class="tab-panel" id="panel-quests">
    <div class="quest-list" id="questList"></div>
  </div>
</div>

<footer>
  <div class="container">
    <p class="footer-text">[ HUNTER SYSTEM v1.0 ] — <span id="footerName">HUNTER</span> — ALL RIGHTS RESERVED</p>
  </div>
</footer>

<script src="data.js"></script>
<script>
// ── PARTICLES ──
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, parts = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
function mkP() { return { x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.2+.3, dx:(Math.random()-.5)*.25, dy:-Math.random()*.4-.08, alpha:Math.random()*.4+.1, color:Math.random()>.5?'59,130,246':'139,92,246' }; }
for (let i = 0; i < 80; i++) parts.push(mkP());
(function draw() {
  ctx.clearRect(0, 0, W, H);
  parts.forEach((p, i) => {
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(${p.color},${p.alpha})`; ctx.fill();
    p.x += p.dx; p.y += p.dy;
    if (p.y < -10) parts[i] = {...mkP(), y: H + 10};
  });
  requestAnimationFrame(draw);
})();

// ── HELPERS ──
const RANK_COLORS = { S:'var(--accent-gold)', A:'var(--accent-orange)', B:'var(--accent-purple)', C:'var(--accent-blue)', D:'var(--accent-green)', E:'var(--text-secondary)' };

function calcXP(e) {
  const base = XP_TABLE[e.rank] || 0;
  if (e.status === 'complete') return base;
  if (e.status === 'progress') return Math.floor(base * 0.5);
  return 0;
}

function getHunterRank(xp) {
  return RANK_THRESHOLDS.find(t => xp >= t.min) || RANK_THRESHOLDS[RANK_THRESHOLDS.length - 1];
}

// ── TAB SWITCHING ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ── FILTER STATE ──
const filterState = { labs: 'all', projects: 'all' };

function setFilter(panel, status, btn) {
  filterState[panel] = status;
  btn.closest('.status-row').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPanel(panel);
}

// ── RENDER SINGLE CARD ──
function renderCard(entry) {
  const xp   = calcXP(entry);
  const base = XP_TABLE[entry.rank] || 0;
  const pct  = base > 0 ? Math.round((xp / base) * 100) : 0;
  const statusKey   = entry.status === 'complete' ? 'complete' : entry.status === 'progress' ? 'progress' : 'locked';
  const statusLabel = entry.status === 'complete' ? 'CLEARED'  : entry.status === 'progress' ? 'IN PROGRESS' : 'LOCKED';
  const tags   = (entry.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  const dateEl = entry.date ? `<div class="card-date">📅 ${entry.date}</div>` : '';
  const linkEl = entry.link
    ? `<div style="margin-top:12px;"><a href="${entry.link}" target="_blank" rel="noopener" class="btn btn-primary" style="font-size:10px;padding:7px 16px;">VIEW WRITEUP →</a></div>`
    : '';

  return `
  <div class="card fade-in">
    <div class="card-corner"></div>
    <div class="card-header">
      <span class="card-rank rank-${entry.rank.toLowerCase()}">${entry.rank}-RANK</span>
      <span class="card-status">
        <span class="status-dot ${statusKey}"></span>
        <span class="status-${statusKey}">${statusLabel}</span>
      </span>
    </div>
    <h3 class="card-title">${entry.name}</h3>
    ${dateEl}
    <div class="mini-progress">
      <div class="mini-track"><div class="mini-fill" style="width:${pct}%"></div></div>
      <span class="mini-pct">${pct}%</span>
    </div>
    <p class="card-desc">${entry.description || ''}</p>
    <div class="card-tags">${tags}</div>
    <div class="card-xp-badge">✦ ${xp.toLocaleString()} XP</div>
    ${linkEl}
  </div>`;
}

// ── RENDER RANK PILLS ──
function renderRankPills(entries, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = ['S','A','B','C','D','E'].map(r => {
    const total = entries.filter(e => e.rank === r).length;
    if (!total) return '';
    const done = entries.filter(e => e.rank === r && e.status === 'complete').length;
    return `<div class="rank-pill">
      <span class="rp-rank" style="color:${RANK_COLORS[r]}">${r}</span>
      <span class="rp-count">${done}/${total}</span>
    </div>`;
  }).join('');
}

// ── RENDER PANEL (LABS or PROJECTS) ──
function renderPanel(panel) {
  const type   = panel === 'labs' ? 'lab' : 'project';
  const status = filterState[panel];
  let entries  = ENTRIES.filter(e => e.type === type);
  if (status !== 'all') entries = entries.filter(e => e.status === status);

  const grid = document.getElementById(panel + 'Grid');
  if (!entries.length) {
    grid.innerHTML = `
      <div class="empty-panel" style="grid-column:1/-1;">
        <div class="empty-panel-icon">⚠</div>
        <div class="empty-panel-text">NO ENTRIES MATCH THIS FILTER</div>
      </div>`;
  } else {
    grid.innerHTML = entries.map(renderCard).join('');
  }
}

// ── RENDER QUESTS ──
function renderQuests() {
  document.getElementById('questList').innerHTML = QUESTS.map(q => `
    <div class="quest-item ${q.boss ? 'quest-boss-item' : ''}">
      <div class="quest-check ${q.done ? 'done' : ''}">${q.done ? '✓' : ''}</div>
      <span class="quest-name ${q.done ? 'done' : ''}">${q.name}</span>
      <span class="quest-xp ${q.boss ? 'quest-xp-boss' : ''}">+${q.xp.toLocaleString()} XP${q.boss ? ' ★' : ''}</span>
    </div>`).join('');
}

// ── SUMMARY BAR ──
function renderSummary() {
  const labs     = ENTRIES.filter(e => e.type === 'lab');
  const projects = ENTRIES.filter(e => e.type === 'project');
  const totalXP  = ENTRIES.reduce((s, e) => s + calcXP(e), 0);
  const rank     = getHunterRank(totalXP);

  document.getElementById('sumTotalXP').textContent   = totalXP.toLocaleString();
  document.getElementById('sumLabsTotal').textContent = labs.length;
  document.getElementById('sumLabsDone').textContent  = labs.filter(e => e.status === 'complete').length;
  document.getElementById('sumProjTotal').textContent = projects.length;
  document.getElementById('sumProjDone').textContent  = projects.filter(e => e.status === 'complete').length;
  document.getElementById('sumRank').textContent      = rank.rank;
  document.getElementById('sumRank').style.color      = RANK_COLORS[rank.rank];

  document.getElementById('footerName').textContent   = HUNTER_NAME;
  document.getElementById('pageSubName').textContent  = `// ${HUNTER_TITLE} //`;
}

// ── INIT ──
renderSummary();
renderRankPills(ENTRIES.filter(e => e.type === 'lab'),     'labRankRow');
renderRankPills(ENTRIES.filter(e => e.type === 'project'), 'projRankRow');
renderPanel('labs');
renderPanel('projects');
renderQuests();
</script>
</body>
</html>
